{% extends "base.html" %}
{% block content %}
<h2>Nova Devolução</h2>
<form method="POST" enctype="multipart/form-data">
    <label>Cliente:</label><br><input type="text" name="cliente" required><br>
    <label>NF do Cliente:</label><br><input type="text" name="nf_cliente" required><br>
    <label>Nossa NF:</label><br><input type="text" name="nf_interna" required><br>
    <label>Valor:</label><br><input type="number" step="0.01" name="valor" required><br>
    <label>Motivo:</label><br><textarea name="motivo"></textarea><br>
    <label>Anexar PDF da Nota:</label><br><input type="file" name="pdf_nota" accept="application/pdf"><br><br>
    <button type="submit">Cadastrar Devolução</button>
</form>
{% endblock %}
